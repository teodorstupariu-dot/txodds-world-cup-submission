[build]
base = "."
command = "python -m pip install . && python -m finalitygate demo --out outputs/demo"
publish = "outputs/demo"

[build.environment]
PYTHON_VERSION = "3.12"
PIP_DISABLE_PIP_VERSION_CHECK = "1"

[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
Referrer-Policy = "no-referrer"
Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'none'; connect-src 'none'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'"
Cache-Control = "public, max-age=300"
